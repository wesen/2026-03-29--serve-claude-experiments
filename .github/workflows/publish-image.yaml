name: publish-image

on:
  pull_request:
    paths:
      - .github/workflows/publish-image.yaml
      - Dockerfile
      - go.mod
      - go.sum
      - cmd/**
      - pkg/**
      - imports/**
      - deploy/gitops-targets.json
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-image.yaml
      - Dockerfile
      - go.mod
      - go.sum
      - cmd/**
      - pkg/**
      - imports/**
      - deploy/gitops-targets.json
  workflow_dispatch:

# id-token: write lets GitHub Actions authenticate to Vault via OIDC; the GitHub
# App installation token minted from Vault then handles cross-repo GitOps writes.
permissions:
  contents: read
  packages: write
  pull-requests: write
  id-token: write

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    # Shared pipeline: build+push the image to GHCR, then (on main) open a GitOps
    # PR that bumps deploy/gitops-targets.json's target. GitOps push permission
    # comes from a GitHub App token minted at run time via Vault OIDC — no
    # long-lived GITOPS_PR_TOKEN PAT. See publish-vault's guide
    # docs/github-app-gitops-pr-automation-guide.md for the provisioning.
    uses: go-go-golems/infra-tooling/.github/workflows/publish-ghcr-image.yml@main
    secrets: inherit
    with:
      dockerfile: ./Dockerfile
      build_context: .
      test_command: |
        go test ./...
      go_version_file: go.mod
      push_image: ${{ github.event_name != 'pull_request' }}
      # GitOps PR only on a trusted push to main.
      gitops_target_config: deploy/gitops-targets.json
      open_gitops_pr: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
      gitops_pr_token_source: github_app
      vault_role: serve-artifacts-gitops-pr
      gitops_app_secret_path: kv/data/ci/github/serve-artifacts/gitops-pr-app
      gitops_app_owner: wesen
      gitops_app_repositories: 2026-03-27--hetzner-k3s
      tooling_repository: go-go-golems/infra-tooling
      tooling_ref: main
