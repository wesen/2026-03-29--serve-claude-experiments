<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Artifact Server</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Geneva', 'Helvetica Neue', Helvetica, sans-serif;
    font-size: 13px;
    background: #fff;
    min-height: 100vh;
  }
  .content { max-width: 1200px; margin: 0 auto; padding: 20px; }
  .content h1 { font-size: 16px; margin-bottom: 2px; }
  .subtitle { color: #666; margin-bottom: 12px; font-size: 11px; }
  .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .search-input {
    flex: 1; min-width: 220px; font: inherit; padding: 6px 10px; border: 2px solid #000; background: #fff;
  }
  select { font: inherit; padding: 5px 6px; border: 2px solid #000; background: #fff; }
  .count { font-size: 11px; color: #333; white-space: nowrap; }
  .layout { display: grid; grid-template-columns: 200px 1fr; gap: 18px; }
  @media (max-width: 720px) { .layout { grid-template-columns: 1fr; } }
  .facets { border-right: 1px dashed #999; padding-right: 14px; }
  .facet-group { margin-bottom: 14px; }
  .facet-group h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 2px solid #000; margin-bottom: 5px; padding-bottom: 2px; }
  .facet-val { display: flex; justify-content: space-between; gap: 6px; cursor: pointer; padding: 2px 3px; font-size: 12px; }
  .facet-val:hover { background: #000; color: #fff; }
  .facet-val.active { background: #000; color: #fff; }
  .facet-val .fcount { color: #888; }
  .facet-val.active .fcount { color: #ccc; }
  .clear { font-size: 11px; cursor: pointer; text-decoration: underline; color: #333; margin-bottom: 8px; display: inline-block; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  .card { border: 2px solid #000; box-shadow: 2px 2px 0 #000; background: #fff; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
  .thumb-wrap { display: block; height: 150px; margin: -10px -10px 2px; border-bottom: 2px solid #000; background: #f2f2f2; overflow: hidden; position: relative; }
  .thumb-wrap.skeleton { background: linear-gradient(90deg,#f2f2f2 25%,#e8e8e8 37%,#f2f2f2 63%); background-size: 400% 100%; animation: shimmer 1.3s ease-in-out infinite; }
  @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: 0 0; } }
  .thumb { width: 100%; height: 150px; object-fit: cover; object-position: top center; display: block; }
  .card a.card-title { font-weight: bold; font-size: 13px; text-decoration: none; color: #000; }
  .card a.card-title:hover { text-decoration: underline; }
  .badges { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
  .badge { font-size: 10px; border: 1px solid #000; padding: 0 4px; text-transform: uppercase; }
  .badge.jsx { background: #dbeafe; } .badge.html { background: #dcfce7; }
  .badge.warn { background: #fee2e2; border-color: #b91c1c; color: #b91c1c; }
  .meta { font-size: 11px; color: #555; }
  .tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .tag { font-size: 10px; background: #eee; border: 1px solid #999; padding: 0 4px; cursor: pointer; }
  .tag:hover { background: #000; color: #fff; }
  .star { cursor: pointer; font-size: 15px; line-height: 1; color: #999; margin-right: 2px; user-select: none; }
  .star.on { color: #e0a400; }
  .tag-editor { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
  .utag { font-size: 10px; background: #eef6ff; border: 1px solid #7ab; padding: 0 3px; display: inline-flex; align-items: center; gap: 2px; }
  .utag .x { cursor: pointer; color: #b00; font-weight: bold; }
  .addtag { font-size: 10px; width: 60px; border: 1px dashed #999; padding: 0 3px; background: #fff; }
  .links { display: flex; justify-content: space-between; align-items: center; gap: 8px; font-size: 10px; margin-top: 5px; }
  .links a { color: #333; text-decoration: none; }
  .links a:hover { text-decoration: underline; }
  .lg, .rg { display: flex; gap: 8px; align-items: center; }
  .addcol { font-size: 10px; border: 1px solid #000; background: #fff; padding: 1px 4px; max-width: 118px; cursor: pointer; }
  .rmcol { color: #999; cursor: pointer; font-weight: bold; }
  .rmcol:hover { color: #b00; }
  .viewtoggle { display: inline-flex; }
  .vbtn { font: inherit; font-size: 14px; line-height: 1; padding: 4px 9px; border: 2px solid #000; background: #fff; cursor: pointer; }
  .vbtn + .vbtn { border-left: none; }
  .vbtn.active { background: #000; color: #fff; }
  /* list mode: reuse #grid but lay children out as rows */
  .grid.list { display: block; grid-template-columns: none; }
  .row { display: grid; grid-template-columns: 56px minmax(0,1fr) 52px 120px 90px 70px 20px; align-items: center; gap: 10px; border: 2px solid #000; border-top: none; padding: 5px 8px; background: #fff; }
  .grid.list .row:first-child { border-top: 2px solid #000; }
  .rthumb { width: 56px; height: 40px; overflow: hidden; border: 1px solid #999; background: #f2f2f2; display: block; }
  .rthumb.skeleton { background: linear-gradient(90deg,#f2f2f2 25%,#e8e8e8 37%,#f2f2f2 63%); background-size: 400% 100%; animation: shimmer 1.3s ease-in-out infinite; }
  .rthumb img { width: 100%; height: 100%; object-fit: cover; object-position: top center; display: block; }
  .rmain { min-width: 0; display: flex; align-items: baseline; gap: 8px; overflow: hidden; }
  .rtitle { font-weight: bold; text-decoration: none; color: #000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rtitle:hover { text-decoration: underline; }
  .rmeta { font-size: 11px; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .more { margin: 16px auto 0; display: block; font: inherit; padding: 6px 16px; border: 2px solid #000; background: #fff; box-shadow: 2px 2px 0 #000; cursor: pointer; }
  .empty { padding: 30px; text-align: center; color: #666; }
  .card.selected, .row.selected { outline: 3px solid #2563eb; outline-offset: 1px; }
  /* command palette */
  .palette-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; justify-content: center; align-items: flex-start; padding-top: 12vh; z-index: 1000; }
  .palette-box { width: 560px; max-width: 92vw; background: #fff; border: 2px solid #000; box-shadow: 4px 4px 0 #000; }
  .palette-input { width: 100%; font: inherit; font-size: 15px; padding: 10px 12px; border: none; border-bottom: 2px solid #000; outline: none; background: #fff; color: inherit; }
  .palette-results { max-height: 50vh; overflow-y: auto; }
  .pr { display: flex; gap: 8px; align-items: center; padding: 7px 12px; cursor: pointer; border-bottom: 1px solid #eee; }
  .pr .pr-title { flex: 1; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pr .pr-meta { font-size: 11px; color: #777; }
  .pr.sel { background: #2563eb; color: #fff; } .pr.sel .pr-meta { color: #dbe6ff; }
  /* dark mode */
  body.dark { background: #191919; color: #e6e6e6; }
  body.dark .subtitle, body.dark .meta, body.dark .rmeta, body.dark .count, body.dark .empty, body.dark .facet-val .fcount { color: #9a9a9a; }
  body.dark .search-input, body.dark select, body.dark .vbtn, body.dark .card, body.dark .row, body.dark .more, body.dark .palette-box, body.dark .palette-input { background: #262626; color: #e6e6e6; border-color: #777; }
  body.dark .card { box-shadow: 2px 2px 0 #000; }
  body.dark .card a.card-title, body.dark .rtitle, body.dark .clear, body.dark a { color: #cfe0ff; }
  body.dark .facet-group h3, body.dark .facet-val { border-color: #555; }
  body.dark .facet-val:hover, body.dark .facet-val.active, body.dark .vbtn.active, body.dark .tag:hover { background: #cfe0ff; color: #191919; }
  body.dark .tag, body.dark .chip { background: #333; border-color: #666; color: #ddd; }
  body.dark .utag { background: #24354d; border-color: #4a6fa5; color: #cfe0ff; }
  body.dark .addtag, body.dark .addcol { background: #262626; color: #e6e6e6; border-color: #666; }
  body.dark .thumb-wrap, body.dark .rthumb { border-color: #444; }
  body.dark .pr { border-color: #333; }
  body.dark .palette-input { border-bottom-color: #777; }
</style>
</head>
<body>
  <div class="content">
      <h1>Artifacts</h1>
      <div class="subtitle">Serving from <code>{{.Dir}}</code> — {{.Count}} artifacts</div>

      <div class="toolbar">
        <input id="q" class="search-input" type="text" placeholder="Search title, description, tags, source, transcript…" autocomplete="off" />
        <select id="sort">
          <option value="recent">Recent</option>
          <option value="title">Title A–Z</option>
          <option value="size">Largest</option>
          <option value="-size">Smallest</option>
          <option value="name">Path</option>
        </select>
        <span class="viewtoggle">
          <button id="view-grid" class="vbtn" title="Grid view">▦</button>
          <button id="view-list" class="vbtn" title="List view">☰</button>
        </span>
        <button id="theme" class="vbtn" title="Toggle dark mode (d)">◐</button>
        <button id="palette-btn" class="vbtn" title="Command palette (⌘K)">⌘K</button>
        <span id="count" class="count"></span>
      </div>

      <div class="layout">
        <aside class="facets">
          <span id="clear" class="clear" style="display:none">✕ clear filters</span>
          <div id="collections"></div>
          <div id="facets"></div>
        </aside>
        <main>
          <div id="grid" class="grid"></div>
          <button id="more" class="more" style="display:none">Load more</button>
          <div id="empty" class="empty" style="display:none">No artifacts match.</div>
        </main>
      </div>
  </div>

  <div id="palette" class="palette-overlay" style="display:none">
    <div class="palette-box">
      <input id="palette-input" class="palette-input" type="text" placeholder="Jump to an artifact…" autocomplete="off" />
      <div id="palette-results" class="palette-results"></div>
    </div>
  </div>

<script>
(function(){
  var PAGE = 60;
  var state = { q: "", sort: "recent", type: "", project: "", model: "", library: "", warnings: false, favorite: false, collection: 0, tags: [], offset: 0, view: "grid" };
  try { var sv = localStorage.getItem("view"); if (sv==="grid"||sv==="list") state.view = sv; } catch(e) {}
  var lastTotal = 0;
  var collections = [];

  var el = function(id){ return document.getElementById(id); };
  var esc = function(s){ var d=document.createElement("div"); d.textContent = s==null?"":s; return d.innerHTML; };

  function facetLabel(dim, val){ return val; }
  var FACET_ORDER = [["type","Type"],["project","Project"],["model","Model"],["tag","Tag"],["library","Library"]];

  function render(data){
    lastTotal = data.total;
    el("count").textContent = data.total + (data.total===1?" result":" results");
    // facets
    var fx = el("facets"); fx.innerHTML = "";
    FACET_ORDER.forEach(function(pair){
      var dim = pair[0], label = pair[1];
      var counts = data.facets[dim] || {};
      var keys = Object.keys(counts).sort(function(a,b){ return counts[b]-counts[a] || a.localeCompare(b); });
      if (keys.length === 0) return;
      var g = document.createElement("div"); g.className = "facet-group";
      g.innerHTML = "<h3>"+esc(label)+"</h3>";
      keys.slice(0, 12).forEach(function(v){
        var active = (dim==="tag") ? state.tags.indexOf(v)>=0 : state[dim]===v;
        var row = document.createElement("div");
        row.className = "facet-val" + (active?" active":"");
        row.innerHTML = "<span>"+esc(facetLabel(dim,v))+"</span><span class='fcount'>"+counts[v]+"</span>";
        row.onclick = function(){ toggleFacet(dim, v); };
        g.appendChild(row);
      });
      fx.appendChild(g);
    });
    el("clear").style.display = anyFilter() ? "inline-block" : "none";
    // flags group: favorites + warnings toggles
    var wg = document.createElement("div"); wg.className = "facet-group";
    wg.innerHTML = "<h3>Flags</h3>";
    var favCount = (data.facets.favorite && data.facets.favorite["true"]) || 0;
    var frow = document.createElement("div");
    frow.className = "facet-val" + (state.favorite?" active":"");
    frow.innerHTML = "<span>★ favorites</span><span class='fcount'>"+favCount+"</span>";
    frow.onclick = function(){ state.favorite = !state.favorite; reload(); };
    wg.appendChild(frow);
    var wrow = document.createElement("div");
    wrow.className = "facet-val" + (state.warnings?" active":"");
    wrow.innerHTML = "<span>has warnings</span>";
    wrow.onclick = function(){ state.warnings = !state.warnings; reload(); };
    wg.appendChild(wrow); fx.appendChild(wg);
  }

  function toggleFavorite(key, cardEl){
    var body = new URLSearchParams(); body.set("key", key);
    fetch("/api/favorite", { method:"POST", headers:{"Content-Type":"application/x-www-form-urlencoded"}, body:body })
      .then(function(r){ return r.json(); })
      .then(function(res){
        var star = cardEl.querySelector(".star");
        if (star){ star.classList.toggle("on", res.favorite); star.textContent = res.favorite ? "★" : "☆"; }
        if (state.favorite) reload(); // if filtering favorites, drop/keep accordingly
      });
  }

  function tagOp(op, key, tag){
    var body = new URLSearchParams(); body.set("key", key); body.set("tag", tag);
    fetch("/api/tags/"+op, { method:"POST", headers:{"Content-Type":"application/x-www-form-urlencoded"}, body:body })
      .then(function(r){ return r.json(); })
      .then(function(){ reload(); });
  }

  function loadCollections(){
    return fetch("/api/collections").then(function(r){ return r.json(); }).then(function(cols){
      collections = cols || [];
      renderCollectionsSidebar();
    });
  }

  function renderCollectionsSidebar(){
    var box = el("collections"); box.innerHTML = "";
    var g = document.createElement("div"); g.className = "facet-group";
    g.innerHTML = "<h3>Collections</h3>";
    if (state.collection){
      var allRow = document.createElement("div"); allRow.className = "facet-val";
      allRow.innerHTML = "<span>✕ show all</span>";
      allRow.onclick = function(){ setCollection(0); };
      g.appendChild(allRow);
    }
    collections.forEach(function(c){
      var row = document.createElement("div");
      row.className = "facet-val" + (state.collection===c.id?" active":"");
      row.innerHTML = "<span>"+esc(c.name)+"</span><span class='fcount'>"+c.count+"</span>";
      row.onclick = function(){ setCollection(state.collection===c.id?0:c.id); };
      g.appendChild(row);
    });
    var mk = document.createElement("input");
    mk.className = "addtag"; mk.type = "text"; mk.placeholder = "＋ new collection"; mk.style.width = "100%"; mk.style.marginTop = "4px";
    mk.addEventListener("keydown", function(e){ if(e.key==="Enter" && mk.value.trim()){
      var body = new URLSearchParams(); body.set("name", mk.value.trim());
      fetch("/api/collections", { method:"POST", headers:{"Content-Type":"application/x-www-form-urlencoded"}, body:body })
        // Re-render the cards too, so their "＋ collection…" dropdowns include the new one.
        .then(function(){ mk.value=""; loadCollections().then(reload); });
    }});
    g.appendChild(mk);
    box.appendChild(g);
  }

  // setCollection changes the active collection filter and refreshes BOTH the
  // sidebar (active state + "show all") and the results.
  function setCollection(id){ state.collection = id; renderCollectionsSidebar(); reload(); }

  function addToCollection(colId, key){
    fetch("/api/collections/"+colId+"/items", { method:"POST", headers:{"Content-Type":"application/x-www-form-urlencoded"}, body:new URLSearchParams({key:key}) })
      .then(function(){ loadCollections(); });
  }
  function removeFromCollection(colId, key){
    fetch("/api/collections/"+colId+"/items?key="+encodeURIComponent(key), { method:"DELETE" })
      .then(function(){ loadCollections(); reload(); });
  }

  function detailURLFor(name){ return "/artifact/" + name.split("/").map(encodeURIComponent).join("/"); }
  function thumbURLFor(name){ return "/thumb/" + name.split("/").map(encodeURIComponent).join("/"); }
  function wireThumb(node){
    var timg = node.querySelector(".thumb, .rthumb img");
    var twrap = node.querySelector(".thumb-wrap, .rthumb");
    if (!timg || !twrap) return;
    var done = function(){ twrap.classList.remove("skeleton"); };
    timg.addEventListener("load", done); timg.addEventListener("error", done);
  }

  function renderCards(results, append){
    var grid = el("grid");
    grid.classList.toggle("list", state.view==="list");
    if (!append) { grid.innerHTML = ""; selIdx = -1; }
    el("empty").style.display = (results.length===0 && !append && lastTotal===0) ? "block" : "none";
    results.forEach(function(d){
      grid.appendChild(state.view==="list" ? buildRow(d) : buildCard(d));
    });
    el("more").style.display = (state.offset + PAGE < lastTotal) ? "block" : "none";
  }

  function humanSize(n){ return n>=1048576 ? (n/1048576).toFixed(1)+" MB" : n>=1024 ? (n/1024).toFixed(1)+" KB" : n+" B"; }

  function buildRow(d){
    var r = document.createElement("div"); r.className = "row";
    var detailURL = detailURLFor(d.name);
    var tags = (d.tags||[]).map(function(t){ return "<span class='tag' data-tag='"+esc(t)+"'>"+esc(t)+"</span>"; }).join("");
    r.innerHTML =
      "<a class='rthumb skeleton' href='"+esc(detailURL)+"'><img loading='lazy' alt='' src='"+thumbURLFor(d.name)+"'></a>" +
      "<div class='rmain'>" +
        "<a class='rtitle' href='"+esc(detailURL)+"'>"+esc(d.title||d.name)+"</a>" +
        (tags?" <span class='tags'>"+tags+"</span>":"") +
      "</div>" +
      "<span class='badge "+esc(d.type)+"'>"+esc(d.type)+"</span>" +
      "<span class='rmeta'>"+esc(d.model||"")+"</span>" +
      "<span class='rmeta'>"+(d.updated_at?esc(d.updated_at.slice(0,10)):"")+"</span>" +
      "<span class='rmeta'>"+humanSize(d.size||0)+"</span>" +
      "<span class='star"+(d.favorite?" on":"")+"' title='favorite'>"+(d.favorite?"★":"☆")+"</span>";
    wireThumb(r);
    r.querySelectorAll(".tag").forEach(function(tn){ tn.onclick = function(e){ e.preventDefault(); toggleFacet("tag", tn.getAttribute("data-tag")); }; });
    r.querySelector(".star").onclick = function(){ toggleFavorite(d.name, r); };
    return r;
  }

  function buildCard(d){
      var c = document.createElement("div"); c.className = "card";
      var star = "<span class='star"+(d.favorite?" on":"")+"' title='favorite'>"+(d.favorite?"★":"☆")+"</span>";
      var badges = "<span class='badge "+esc(d.type)+"'>"+esc(d.type)+"</span>";
      if (d.warnings_count>0) badges += "<span class='badge warn' title='reconstruction warnings'>⚠ "+d.warnings_count+"</span>";
      if (d.model) badges += "<span class='meta'>"+esc(d.model)+"</span>";
      // d.tags is manifest ∪ user tags; user tags render below as removable
      // chips, so the gray (filterable) row shows manifest-only tags to avoid
      // showing the same tag twice.
      var userSet = {}; (d.user_tags||[]).forEach(function(t){ userSet[t.toLowerCase()] = true; });
      var manifestTags = (d.tags||[]).filter(function(t){ return !userSet[t.toLowerCase()]; });
      var tags = manifestTags.map(function(t){ return "<span class='tag' data-tag='"+esc(t)+"'>"+esc(t)+"</span>"; }).join("");
      var leftLinks = "<a href='"+esc(d.view_url)+"'>view</a>";
      if (d.source_uuid) leftLinks += "<a href='https://claude.ai/chat/"+esc(d.source_uuid)+"' target='_blank'>claude.ai</a>";
      var rmLink = state.collection ? "<a href='javascript:void(0)' class='rmcol' title='Remove from this collection'>✕</a>" : "";
      var opts = "<option value=''>＋ collection</option>" + collections.map(function(c2){ return "<option value='"+c2.id+"'>"+esc(c2.name)+"</option>"; }).join("");
      var userTags = (d.user_tags||[]).map(function(t){ return "<span class='utag' data-tag='"+esc(t)+"'>"+esc(t)+"<b class='x' title='remove'>×</b></span>"; }).join("");
      var detailURL = detailURLFor(d.name);
      var thumb = "<a class='thumb-wrap skeleton' href='"+esc(detailURL)+"' title='"+esc(d.title||d.name)+"'>" +
        "<img class='thumb' loading='lazy' alt='' src='"+thumbURLFor(d.name)+"'></a>";
      c.innerHTML =
        thumb +
        "<div class='badges'>"+star+badges+"</div>" +
        "<a class='card-title' href='"+esc(detailURL)+"'>"+esc(d.title||d.name)+"</a>" +
        (d.description?"<div class='meta'>"+esc(d.description)+"</div>":"") +
        (d.updated_at?"<div class='meta'>"+esc(d.updated_at.slice(0,10))+"</div>":"") +
        (tags?"<div class='tags'>"+tags+"</div>":"") +
        "<div class='tag-editor'>"+userTags+"<input class='addtag' type='text' placeholder='+tag' />" +
        "</div>" +
        "<div class='links'><span class='lg'>"+leftLinks+"</span><span class='rg'>"+rmLink+"<select class='addcol'>"+opts+"</select></span></div>";
      wireThumb(c);
      c.querySelectorAll(".tag").forEach(function(tn){ tn.onclick = function(e){ e.preventDefault(); toggleFacet("tag", tn.getAttribute("data-tag")); }; });
      c.querySelector(".star").onclick = function(){ toggleFavorite(d.name, c); };
      c.querySelectorAll(".utag .x").forEach(function(xb){ xb.onclick = function(){ tagOp("remove", d.name, xb.parentNode.getAttribute("data-tag")); }; });
      var addInput = c.querySelector(".addtag");
      addInput.addEventListener("keydown", function(e){ if(e.key==="Enter" && addInput.value.trim()){ tagOp("add", d.name, addInput.value.trim()); } });
      var addSel = c.querySelector(".addcol");
      addSel.addEventListener("change", function(){ if(addSel.value){ addToCollection(addSel.value, d.name); addSel.value=""; } });
      var rm = c.querySelector(".rmcol");
      if (rm) rm.onclick = function(){ removeFromCollection(state.collection, d.name); };
      return c;
  }

  function anyFilter(){ return state.type||state.project||state.model||state.library||state.warnings||state.favorite||state.collection||state.tags.length>0; }

  function toggleFacet(dim, val){
    if (dim === "tag"){ var i = state.tags.indexOf(val); if (i>=0) state.tags.splice(i,1); else state.tags.push(val); }
    else { state[dim] = (state[dim]===val) ? "" : val; }
    reload();
  }

  function qs(){
    var p = new URLSearchParams();
    if (state.q) p.set("q", state.q);
    if (state.sort) p.set("sort", state.sort);
    ["type","project","model","library"].forEach(function(k){ if(state[k]) p.set(k, state[k]); });
    if (state.warnings) p.set("warnings","true");
    if (state.favorite) p.set("favorite","true");
    if (state.collection) p.set("collection", state.collection);
    state.tags.forEach(function(t){ p.append("tag", t); });
    p.set("limit", PAGE); p.set("offset", state.offset);
    return p.toString();
  }

  function fetchPage(append){
    fetch("/search?"+qs()).then(function(r){ return r.json(); }).then(function(data){
      render(data);
      renderCards(data.results, append);
    });
  }

  function reload(){ state.offset = 0; fetchPage(false); }

  el("q").addEventListener("input", debounce(function(){ state.q = el("q").value.trim(); reload(); }, 180));
  el("sort").addEventListener("change", function(){ state.sort = el("sort").value; reload(); });
  el("more").addEventListener("click", function(){ state.offset += PAGE; fetchPage(true); });
  el("clear").addEventListener("click", function(){ state.type=state.project=state.model=state.library=""; state.tags=[]; state.warnings=false; state.favorite=false; state.collection=0; reload(); });

  function setView(v){
    state.view = v;
    try { localStorage.setItem("view", v); } catch(e) {}
    el("view-grid").classList.toggle("active", v==="grid");
    el("view-list").classList.toggle("active", v==="list");
    reload();
  }
  el("view-grid").addEventListener("click", function(){ setView("grid"); });
  el("view-list").addEventListener("click", function(){ setView("list"); });
  el("view-grid").classList.toggle("active", state.view==="grid");
  el("view-list").classList.toggle("active", state.view==="list");

  function debounce(fn, ms){ var t; return function(){ clearTimeout(t); t=setTimeout(fn, ms); }; }

  // ---- dark mode --------------------------------------------------------
  try { state.dark = (localStorage.getItem("theme")==="dark"); } catch(e) {}
  function applyTheme(){ document.body.classList.toggle("dark", !!state.dark); }
  function toggleTheme(){ state.dark = !state.dark; try { localStorage.setItem("theme", state.dark?"dark":"light"); } catch(e) {} applyTheme(); }
  el("theme").addEventListener("click", toggleTheme);
  applyTheme();

  // ---- command palette (⌘K) ---------------------------------------------
  var palResults = [], palSel = 0;
  function openPalette(){ el("palette").style.display="flex"; var i=el("palette-input"); i.value=""; el("palette-results").innerHTML=""; palResults=[]; palSel=0; i.focus(); }
  function closePalette(){ el("palette").style.display="none"; }
  function isPaletteOpen(){ return el("palette").style.display!=="none"; }
  function renderPalette(){
    var box = el("palette-results");
    box.innerHTML = palResults.map(function(d,i){
      return "<div class='pr"+(i===palSel?" sel":"")+"' data-i='"+i+"'><span class='pr-title'>"+esc(d.title||d.name)+"</span><span class='pr-meta'>"+esc(d.type)+(d.model?" · "+esc(d.model):"")+"</span></div>";
    }).join("");
    box.querySelectorAll(".pr").forEach(function(row){ row.onclick = function(){ gotoResult(parseInt(row.getAttribute("data-i"),10)); }; });
  }
  function palQuery(q){
    fetch("/search?limit=8&q="+encodeURIComponent(q)).then(function(r){ return r.json(); }).then(function(data){
      palResults = data.results || []; palSel = 0; renderPalette();
    });
  }
  function gotoResult(i){ var d=palResults[i]; if(d) location.href = detailURLFor(d.name); }
  el("palette-btn").addEventListener("click", openPalette);
  el("palette").addEventListener("click", function(e){ if(e.target===el("palette")) closePalette(); });
  el("palette-input").addEventListener("input", debounce(function(){ palQuery(el("palette-input").value.trim()); }, 150));
  el("palette-input").addEventListener("keydown", function(e){
    if(e.key==="ArrowDown"){ e.preventDefault(); palSel=Math.min(palSel+1, palResults.length-1); renderPalette(); }
    else if(e.key==="ArrowUp"){ e.preventDefault(); palSel=Math.max(palSel-1, 0); renderPalette(); }
    else if(e.key==="Enter"){ e.preventDefault(); gotoResult(palSel); }
    else if(e.key==="Escape"){ closePalette(); }
  });

  // ---- keyboard navigation ----------------------------------------------
  var selIdx = -1;
  function gridItems(){ return Array.prototype.slice.call(el("grid").children); }
  function setSel(i){
    var it = gridItems(); if(!it.length) return;
    if(selIdx>=0 && it[selIdx]) it[selIdx].classList.remove("selected");
    selIdx = Math.max(0, Math.min(i, it.length-1));
    it[selIdx].classList.add("selected");
    it[selIdx].scrollIntoView({block:"nearest"});
  }
  document.addEventListener("keydown", function(e){
    if((e.key==="k"||e.key==="K") && (e.metaKey||e.ctrlKey)){ e.preventDefault(); openPalette(); return; }
    var tag = (e.target.tagName||"").toLowerCase();
    if(tag==="input"||tag==="select"||tag==="textarea"||isPaletteOpen()) return;
    if(e.key==="/"){ e.preventDefault(); el("q").focus(); }
    else if(e.key==="j"){ e.preventDefault(); setSel(selIdx+1); }
    else if(e.key==="k"){ e.preventDefault(); setSel(selIdx<0?0:selIdx-1); }
    else if(e.key==="d"){ toggleTheme(); }
    else if(e.key==="o"||e.key==="Enter"){ var it=gridItems(); if(it[selIdx]){ var a=it[selIdx].querySelector("a"); if(a) location.href=a.href; } }
    else if(e.key==="f"){ var it=gridItems(); if(it[selIdx]){ var s=it[selIdx].querySelector(".star"); if(s) s.click(); } }
  });

  loadCollections();
  reload();
})();
</script>

(function(){var es=new EventSource("/events");es.onmessage=function(e){if(e.data==="reload")location.reload()};es.onerror=function(){setTimeout(function(){location.reload()},2000)};})();
</script>{{end}}
