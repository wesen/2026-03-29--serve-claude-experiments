<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}} — Artifact Viewer</title>
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom": "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime"
    }
  }
  </script>
  {{if .LoadBabel}}<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>{{end}}
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; }
    .artifact-nav {
      position: fixed; top: 8px; right: 8px; z-index: 99999;
      font-family: 'Geneva', 'Helvetica Neue', sans-serif; font-size: 11px;
      background: #fff; border: 2px solid #000; box-shadow: 2px 2px 0 #000;
      padding: 4px 10px; cursor: pointer; opacity: 0.7;
      transition: opacity 0.2s;
    }
    .artifact-nav:hover { opacity: 1; background: #000; color: #fff; }
    .artifact-nav a { text-decoration: none; color: inherit; }
  </style>
</head>
<body>
  <div class="artifact-nav"><a href="/">&#x25C0; Index</a></div>
  <div id="root"></div>
  {{if .Watch}}<script>
(function(){var es=new EventSource("/events");es.onmessage=function(e){if(e.data==="reload")location.reload()};es.onerror=function(){setTimeout(function(){location.reload()},2000)};})();
  </script>{{end}}
  <script type="{{.ScriptType}}" {{if .LoadBabel}}data-type="module"{{end}} src="{{.ScriptSrc}}"></script>
</body>
</html>
