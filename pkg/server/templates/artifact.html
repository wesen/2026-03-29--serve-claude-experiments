<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Title}} — Artifact</title>
<!-- html2canvas: rasterize the live artifact iframe so the current (interacted)
     view can be saved as the thumbnail. -->
<script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Geneva','Helvetica Neue',Helvetica,sans-serif; font-size: 13px; background: #fff; }
  .content { max-width: 1200px; margin: 0 auto; padding: 16px 20px 40px; }
  a { color: #333; }
  .top { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
  .top h1 { font-size: 17px; }
  .back { font-size: 12px; text-decoration: none; border: 2px solid #000; box-shadow: 2px 2px 0 #000; padding: 3px 9px; background: #fff; }
  .back:hover { background: #000; color: #fff; }
  .badge { font-size: 10px; border: 1px solid #000; padding: 0 4px; text-transform: uppercase; }
  .badge.jsx { background: #dbeafe; } .badge.html { background: #dcfce7; }
  .badge.warn { background: #fee2e2; border-color: #b91c1c; color: #b91c1c; }
  .layout { display: grid; grid-template-columns: 1fr 300px; gap: 16px; align-items: start; }
  @media (max-width: 820px) { .layout { grid-template-columns: 1fr; } }
  .preview { border: 2px solid #000; box-shadow: 3px 3px 0 #000; background: #fff; height: 620px; }
  .preview iframe { width: 100%; height: 100%; border: 0; display: block; }
  .panel { display: flex; flex-direction: column; gap: 12px; }
  .box { border: 2px solid #000; box-shadow: 2px 2px 0 #000; background: #fff; padding: 10px; }
  .box h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; border-bottom: 2px solid #000; padding-bottom: 2px; margin-bottom: 6px; }
  .kv { display: grid; grid-template-columns: 74px 1fr; gap: 3px 8px; font-size: 12px; }
  .kv .k { color: #666; }
  .kv .v { word-break: break-word; }
  .star { cursor: pointer; font-size: 18px; line-height: 1; color: #999; user-select: none; }
  .star.on { color: #e0a400; }
  .tags { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
  .utag { font-size: 11px; background: #eef6ff; border: 1px solid #7ab; padding: 0 4px; display: inline-flex; align-items: center; gap: 3px; }
  .utag .x { cursor: pointer; color: #b00; font-weight: bold; }
  .mtag { font-size: 11px; background: #eee; border: 1px solid #999; padding: 0 4px; }
  .addtag { font-size: 11px; width: 90px; border: 1px dashed #999; padding: 1px 4px; background: #fff; }
  select { font: inherit; font-size: 11px; border: 1px solid #999; background: #fff; }
  .warnings { font-size: 11px; color: #b91c1c; }
  .warnings li { margin-left: 16px; }
  .thumbprev { width: 100%; border: 1px solid #000; display: block; margin-bottom: 6px; background: #f2f2f2; min-height: 40px; }
  .thumbctl { display: flex; gap: 6px; flex-wrap: wrap; }
  .src { border: 2px solid #000; box-shadow: 2px 2px 0 #000; background: #fbfbfb; margin-top: 16px; }
  .src h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; padding: 6px 10px; border-bottom: 2px solid #000; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .srcbtns { display: flex; gap: 6px; }
  .sbtn { font: inherit; font-size: 10px; text-transform: uppercase; letter-spacing: .03em; border: 1px solid #000; background: #fff; padding: 1px 7px; cursor: pointer; }
  .sbtn:hover { background: #000; color: #fff; }
  #source { max-height: 520px; overflow: auto; }
  #source.muted { padding: 10px; }
  #source pre { margin: 0; padding: 10px; font-family: 'SF Mono','Consolas',monospace; font-size: 12px; line-height: 1.45; }
  .muted { color: #888; }
  /* theater mode: hide the sidebar, let the preview fill the width and grow taller */
  .theater .panel { display: none; }
  .theater .layout { grid-template-columns: 1fr; }
  .theater .preview { height: 86vh; }
  #theater.on { background: #000; color: #fff; }
</style>
</head>
<body data-name="{{.Name}}" data-type="{{.Type}}" data-filename="{{.Filename}}">
  <div class="content">
    <div class="top">
      <a class="back" href="/">&#x25C0; Index</a>
      <h1>{{.Title}}</h1>
      <span class="badge {{.Type}}">{{.Type}}</span>
      <button id="theater" class="back" title="Theater mode (t)" style="cursor:pointer">▣ Theater</button>
    </div>

    <div class="layout">
      <div class="preview"><iframe id="frame" title="preview"></iframe></div>
      <aside class="panel">
        <div class="box">
          <h3>Actions</h3>
          <div class="tags">
            <span id="star" class="star" title="favorite">☆</span>
            <a id="open" href="#" target="_blank">open ▸</a>
            <a id="claude" href="#" target="_blank" style="display:none">claude.ai ▸</a>
            <a id="transcript" href="#" target="_blank" style="display:none">transcript ▸</a>
            <a id="session" href="#" style="display:none" title="Download the whole conversation (transcript + JSON + all artifacts)">session ⬇</a>
          </div>
        </div>
        <div class="box">
          <h3>Thumbnail</h3>
          <img id="thumbprev" class="thumbprev" alt="thumbnail">
          <div class="thumbctl">
            <button id="capture" class="sbtn" title="Capture the current view as the thumbnail (c)">📸 capture view</button>
            <button id="rerender" class="sbtn" title="Re-render a fresh server-side screenshot">↻ re-render</button>
          </div>
          <div id="thumbmsg" class="muted" style="font-size:10px;margin-top:4px"></div>
        </div>
        <div class="box">
          <h3>Metadata</h3>
          <div id="meta" class="kv"></div>
        </div>
        <div class="box">
          <h3>Tags</h3>
          <div id="tagbox" class="tags"></div>
          <div style="margin-top:6px"><input id="addtag" class="addtag" type="text" placeholder="+ tag"></div>
        </div>
        <div class="box">
          <h3>Collections</h3>
          <select id="addcol"><option value="">＋ add to collection…</option></select>
        </div>
        <div id="warnbox" class="box" style="display:none">
          <h3>Reconstruction warnings</h3>
          <ul id="warnings" class="warnings"></ul>
        </div>
      </aside>
    </div>

    <div class="src">
      <h3>
        <span>Source <span id="srcmeta" class="muted"></span></span>
        <span class="srcbtns">
          <button id="copy" class="sbtn" title="Copy source to clipboard">copy</button>
          <button id="download" class="sbtn" title="Download this source file">download</button>
        </span>
      </h3>
      <div id="source" class="muted">Loading…</div>
    </div>
  </div>

<script>
(function(){
  var name = document.body.dataset.name;
  var enc = name.split("/").map(encodeURIComponent).join("/");
  var el = function(id){ return document.getElementById(id); };
  var esc = function(s){ var d=document.createElement("div"); d.textContent = s==null?"":s; return d.innerHTML; };

  el("frame").src = "/view/" + enc + "?embed=1";
  el("open").href = "/view/" + enc;

  var collections = [];
  function loadCollections(){
    return fetch("/api/collections").then(function(r){ return r.json(); }).then(function(cols){
      collections = cols || [];
      var sel = el("addcol");
      sel.innerHTML = "<option value=''>＋ add to collection…</option>" +
        collections.map(function(c){ return "<option value='"+c.id+"'>"+esc(c.name)+"</option>"; }).join("");
    });
  }
  el("addcol").addEventListener("change", function(){
    var id = el("addcol").value; if(!id) return;
    fetch("/api/collections/"+id+"/items", {method:"POST", headers:{"Content-Type":"application/x-www-form-urlencoded"}, body:new URLSearchParams({key:name})})
      .then(function(){ el("addcol").value=""; });
  });

  function renderTags(doc){
    var box = el("tagbox"); box.innerHTML = "";
    (doc.tags||[]).forEach(function(t){
      var isUser = (doc.user_tags||[]).indexOf(t) >= 0;
      var span = document.createElement("span");
      span.className = isUser ? "utag" : "mtag";
      span.innerHTML = esc(t) + (isUser ? "<b class='x' title='remove'>×</b>" : "");
      if (isUser) span.querySelector(".x").onclick = function(){ tagOp("remove", t); };
      box.appendChild(span);
    });
  }
  function tagOp(op, tag){
    fetch("/api/tags/"+op, {method:"POST", headers:{"Content-Type":"application/x-www-form-urlencoded"}, body:new URLSearchParams({key:name, tag:tag})})
      .then(function(){ load(); });
  }
  el("addtag").addEventListener("keydown", function(e){
    if(e.key==="Enter" && el("addtag").value.trim()){ tagOp("add", el("addtag").value.trim()); el("addtag").value=""; }
  });

  el("star").onclick = function(){
    fetch("/api/favorite", {method:"POST", headers:{"Content-Type":"application/x-www-form-urlencoded"}, body:new URLSearchParams({key:name})})
      .then(function(r){ return r.json(); })
      .then(function(res){ setStar(res.favorite); });
  };
  function setStar(on){ var s=el("star"); s.classList.toggle("on", on); s.textContent = on ? "★" : "☆"; }

  function row(k, v){ return "<span class='k'>"+esc(k)+"</span><span class='v'>"+v+"</span>"; }

  function load(){
    fetch("/api/artifact/" + enc).then(function(r){ return r.json(); }).then(function(data){
      var d = data.artifact;
      setStar(d.favorite);
      renderTags(d);
      // metadata
      var m = [];
      if (d.type) m.push(row("Type", esc(d.type)));
      if (data.project) m.push(row("Project", esc(data.project)));
      if (d.model) m.push(row("Model", esc(d.model)));
      if (data.created_at) m.push(row("Created", esc(data.created_at.slice(0,10))));
      if (d.updated_at) m.push(row("Updated", esc(d.updated_at.slice(0,10))));
      if (data.size) m.push(row("Size", (data.size/1024).toFixed(1)+" KB"));
      if (d.filename) m.push(row("File", esc(d.filename)));
      if (d.render_ok === false) m.push(row("Render", "<span style='color:#b91c1c'>⚠ console error</span>"));
      else if (d.render_ok === true) m.push(row("Render", "ok"));
      el("meta").innerHTML = m.join("");
      // links
      if (data.claude_url){ el("claude").href = data.claude_url; el("claude").style.display=""; }
      if (data.has_transcript){ el("transcript").href = "/transcript/" + enc; el("transcript").style.display=""; }
      if (d.source_uuid){ el("session").href = "/session/" + enc; el("session").style.display=""; }
      // warnings
      var warns = data.warnings || [];
      if (warns.length){
        el("warnbox").style.display = "";
        el("warnings").innerHTML = warns.map(function(x){ return "<li>"+esc(x)+"</li>"; }).join("");
      }
      el("srcmeta").textContent = d.filename || "";
    });
  }

  // source: raw text (for copy/download) + server-side syntax highlighting (chroma).
  var rawText = "";
  fetch("/raw/" + enc).then(function(r){ return r.text(); }).then(function(txt){ rawText = txt; });
  fetch("/highlight/" + enc).then(function(r){ return r.text(); }).then(function(html){
    var box = el("source"); box.classList.remove("muted"); box.innerHTML = html;
  }).catch(function(){ el("source").textContent = "(could not load source)"; });

  function flash(btn, msg){ var old = btn.textContent; btn.textContent = msg; setTimeout(function(){ btn.textContent = old; }, 1100); }
  el("copy").onclick = function(){
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(rawText).then(function(){ flash(el("copy"), "copied ✓"); }, function(){ flash(el("copy"), "failed"); });
    }
  };
  el("download").onclick = function(){
    var fn = document.body.dataset.filename || name.split("/").pop();
    var blob = new Blob([rawText], {type: "text/plain"});
    var a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = fn;
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(a.href);
  };

  // thumbnail: preview + recapture. "capture view" rasterizes the current iframe
  // (what you see after interacting) and saves it; "re-render" asks the server for
  // a fresh headless-Chrome screenshot (reliable for WebGL / early-captured bases).
  function refreshThumbPreview(){ el("thumbprev").src = "/thumb/" + enc + "?v=" + Date.now(); }
  refreshThumbPreview();
  function thumbMsg(m){ el("thumbmsg").textContent = m; }
  function setThumbFromView(){
    var iframe = el("frame"); var win = iframe.contentWindow, doc = iframe.contentDocument;
    if (!doc){ thumbMsg("preview not ready"); return; }
    if (!window.html2canvas){ thumbMsg("capture library unavailable"); return; }
    thumbMsg("capturing…");
    window.html2canvas(doc.body, {
      backgroundColor: "#ffffff", logging: false, useCORS: true, allowTaint: false,
      x: win.scrollX || 0, y: win.scrollY || 0,
      width: iframe.clientWidth, height: iframe.clientHeight, scrollX: 0, scrollY: 0,
      windowWidth: doc.documentElement.scrollWidth, windowHeight: doc.documentElement.scrollHeight
    }).then(function(canvas){
      canvas.toBlob(function(blob){
        if (!blob){ thumbMsg("capture produced no image"); return; }
        fetch("/thumb/" + enc, { method:"POST", headers:{"Content-Type":"image/png"}, body:blob })
          .then(function(r){ return r.ok ? r.json() : r.text().then(function(t){ throw new Error(t); }); })
          .then(function(){ refreshThumbPreview(); thumbMsg("thumbnail updated ✓ (from this view)"); })
          .catch(function(e){ thumbMsg("save failed: " + e.message); });
      }, "image/png");
    }).catch(function(e){ thumbMsg("capture failed: " + (e && e.message || e) + " — try re-render"); });
  }
  function rerenderThumb(){
    thumbMsg("re-rendering (server)…");
    fetch("/api/thumb/rerender/" + enc, { method:"POST" })
      .then(function(r){ return r.json(); })
      .then(function(res){ if (res.ok){ refreshThumbPreview(); thumbMsg("re-rendered ✓"); } else { thumbMsg("re-render failed: " + (res.error||"")); } })
      .catch(function(){ thumbMsg("re-render failed"); });
  }
  el("capture").onclick = setThumbFromView;
  el("rerender").onclick = rerenderThumb;

  // theater mode: hide the sidebar for a larger preview. Toggle with the button,
  // the 't' key, or exit with Escape.
  function toggleTheater(){ document.body.classList.toggle("theater"); el("theater").classList.toggle("on", document.body.classList.contains("theater")); }
  el("theater").onclick = toggleTheater;
  document.addEventListener("keydown", function(e){
    var tag = (e.target.tagName||"").toLowerCase();
    if (tag==="input"||tag==="textarea"||tag==="select") return;
    if (e.key==="t"){ toggleTheater(); }
    else if (e.key==="c"){ setThumbFromView(); }
    else if (e.key==="Escape" && document.body.classList.contains("theater")){ toggleTheater(); }
  });

  loadCollections();
  load();
})();
</script>
{{if .Watch}}<script>
(function(){var es=new EventSource("/events");es.onmessage=function(e){if(e.data==="reload")location.reload()};es.onerror=function(){setTimeout(function(){location.reload()},2000)};})();
</script>{{end}}
</body>
</html>
